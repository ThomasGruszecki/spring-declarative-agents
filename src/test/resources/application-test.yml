# Test properties used by SpringDeclarativeAgentsIntegrationTests
# These will override any properties in application.yml during tests
llm:
  providers:
    # Configuration for a mock "TestLM" provider used in integration tests
    TestLM:
      # api-key is still required by validation, but won't be used against the mock server
      api-key: "test-key-12345"
      # api-url will be dynamically set in the test to point to MockWebServer
      api-url: "http://localhost:8080" # Placeholder, will be overridden

    # Configuration for another mock provider if needed for different tests
    AnotherLM:
      api-key: "another-key-67890"
      api-url: "http://localhost:8081" # Placeholder

# Optional: Define the base package for scanning if not relying on default/auto-detection
# spring:
#   llm:
#     scan-packages: com.gruszecki.agents.testclients

# Logging level for tests (optional)
logging:
  level:
    com.gruszecki.agents: DEBUG # Set to DEBUG to see detailed logs from the starter
    # org.springframework.web: DEBUG # Uncomment for Spring WebClient logging
    # okhttp3.mockwebserver.MockWebServer: DEBUG # Uncomment for MockWebServer logging

